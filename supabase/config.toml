# ─── Auth Configuration ───────────────────────────────────────
[auth]
site_url = "https://sendmo.co"
additional_redirect_urls = [
  "https://sendmo.co/dashboard",
  "https://sendmo.co/**",
  "http://localhost:5173/dashboard",
  "http://localhost:5173/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(SMTP_PASS)"
admin_email = "noreply@sendmo.co"
sender_name = "SendMo"

[functions.test-db-insert]
enabled = true
verify_jwt = true
import_map = "./functions/test-db-insert/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/test-db-insert/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/test-db-insert/*.html" ]

[functions.admin-report]
enabled = true
verify_jwt = true
import_map = "./functions/admin-report/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/admin-report/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/admin-report/*.html" ]
