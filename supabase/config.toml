# ─── Auth Configuration ───────────────────────────────────────
[auth]
site_url = "https://sendmo.co"
additional_redirect_urls = [
  "https://sendmo.co/dashboard",
  "https://sendmo.co/**",
  "http://localhost:5173/dashboard",
  "http://localhost:5173/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(SMTP_PASS)"
admin_email = "noreply@sendmo.co"
sender_name = "SendMo"

[functions.test-db-insert]
enabled = true
verify_jwt = true
import_map = "./functions/test-db-insert/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/test-db-insert/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/test-db-insert/*.html" ]

[functions.admin-report]
enabled = true
verify_jwt = true
import_map = "./functions/admin-report/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/admin-report/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/admin-report/*.html" ]

# Stripe Phase B — saved cards on file.
# POST creates a SetupIntent (mode resolved server-side from profile.admin_active_mode);
# DELETE /:pm_id detaches a saved card. Authenticated users only — verify_jwt = true.
# Explicit listing per the 2026-05-11 LOG incident (the `links` function 401'd in
# prod when its toml section was absent and Supabase defaulted to verify_jwt=true).
[functions.payment-methods]
enabled = true
verify_jwt = true

# ─── verify_jwt = false ─────────────────────────────────────
#
# Anon-callable functions. The client passes the publishable anon key
# (`sb_publishable_*`), which is NOT JWT-formatted, so Supabase's gateway
# rejects it under the default `verify_jwt = true`. Listing them here
# locks the setting in config so a bare `supabase functions deploy <fn>`
# can't accidentally regress to verify_jwt=true (as happened on
# 2026-05-10 with place-details — see LOG.md).
#
# Belt + suspenders: also pass `--no-verify-jwt` on per-function deploys.

# Public Google Places proxies — no user data, called from anon + authed.
[functions.autocomplete]
enabled = true
verify_jwt = false

[functions.place-details]
enabled = true
verify_jwt = false

# Address verification (EasyPost) for the recipient onboarding flow.
[functions.addresses]
enabled = true
verify_jwt = false

# OTP send/confirm for the flexible-link email verification step.
[functions.email]
enabled = true
verify_jwt = false

# Magic Guestimator — Anthropic Haiku 4.5 dim/weight estimation.
[functions.guestimate]
enabled = true
verify_jwt = false

# EasyPost rate fetch for the prepaid-label flow.
[functions.rates]
enabled = true
verify_jwt = false

# EasyPost label purchase — anon checkout flow uses a placeholder user_id.
[functions.labels]
enabled = true
verify_jwt = false

# `links` GET ?code= is public (anonymous sender flow). POST + PATCH do their
# own JWT validation via supabase.auth.getUser(token) inside the function.
# Section was missing entirely until 2026-05-11; Supabase defaulted to
# verify_jwt = true and the sender flow's first fetchLink call 401'd in prod.
[functions.links]
enabled = true
verify_jwt = false

# Public tracking page lookup — no auth.
[functions.tracking]
enabled = true
verify_jwt = false

# EasyPost webhook receiver — verified via EasyPost's own signature, not JWT.
[functions.webhooks]
enabled = true
verify_jwt = false

# Stripe PaymentIntent creation — called by anon checkout.
[functions.payments]
enabled = true
verify_jwt = false

# Stripe webhook receiver — verified via Stripe's own signature, not JWT.
[functions.stripe-webhook]
enabled = true
verify_jwt = false

# Internal structured event logging — called by other Edge Functions with
# the service role key. Setting verify_jwt=false avoids any gateway
# rejection of non-standard tokens; auth is handled inside the function.
[functions.ingest]
enabled = true
verify_jwt = false

# Admin one-shot reconciliation — backfills shipments.easypost_refund_status
# from EasyPost for cancelled shipments where it's NULL. Admin-gated inside
# the function via requireAdmin (validates JWT + profiles.role='admin').
[functions.backfill-refund-status]
enabled = true
verify_jwt = true

# Admin-initiated refund endpoint (H3 — pre-launch P1).
# Resolves the PaymentIntent from the named charge transaction row, computes
# the remaining per-PI refundable balance, and calls Stripe createRefund.
# verify_jwt=true: gateway requires a real JWT; requireAdmin then checks role.
# Per decided proposal 2026-05-21_refund-system-implementation_decided-2026-05-22.
[functions.refunds]
enabled = true
verify_jwt = true

# H4 — Reconciliation dashboard + sweep + admin actions (pre-launch P1).
# Per decided proposal 2026-05-22_reconciliation-and-carrier-adjustments_decided-2026-05-22.

# GET endpoint — returns summary cards + per-shipment rows + needs-attention items
# for the /admin Reconciliation tab. Admin-gated via requireAdmin.
[functions.reconciliation-report]
enabled = true
verify_jwt = true

# POST endpoint — daily incremental + weekly bulk EasyPost diff.
# Also called by pg_cron (service-role Bearer). Both paths valid.
# verify_jwt=false: pinned to match deployed reality. The CI workflow always
# deploys --no-verify-jwt (long-standing gotcha, see deploy-edge-functions.yml),
# so the previous `true` here was dead config that a MANUAL `functions deploy`
# (which reads this file) would have silently enforced on a money-path cron
# target. The function's own isCronCall/requireAdmin is the real gate.
# (2026-07-06 register-cron-sweeps review B1.)
[functions.reconciliation-sweep]
enabled = true
verify_jwt = false

# POST endpoint — Needs-Attention action buttons: dispute / recharge / absorb.
# Admin-gated via requireAdmin.
[functions.admin-recon-action]
enabled = true
verify_jwt = true

# H5 — Refund cron sweep (pre-launch P1).
# Finds refund_status='submitted' shipments older than 21 days, polls EasyPost
# one last time, and resolves: refunded (fire missed createRefund) / rejected
# (mark terminal + Email C) / timed-out (mark rejected + Email C).
# Admin-gated via requireAdmin for manual invocation; pg_cron service-role path
# registered 2026-07-06 (migration 036 — see register-cron-sweeps proposal).
# Per decided proposals: 2026-05-21_refund-system-implementation D3/D4/D5.
# verify_jwt=false: pinned to match deployed reality (CI always deploys
# --no-verify-jwt; a manual deploy reads this file). isCronCall/requireAdmin
# is the real gate. (register-cron-sweeps review B1.)
[functions.cron-refund-sweep]
enabled = true
verify_jwt = false

# G2 — Supabase Auth Send Email Hook (pre-launch branded OTP/login emails).
# Wires custom SendMo-branded otpEmail template into signup / login /
# magiclink / recovery / email_change flows. Without this hook, Supabase
# Auth sends default Supabase-branded emails (zero SendMo branding).
# Verifies HMAC signature against SEND_EMAIL_HOOK_SECRET per the Standard
# Webhooks spec — NOT a user JWT (Supabase Auth doesn't send one for hooks).
# Registration:
#   1. Set SEND_EMAIL_HOOK_SECRET in Supabase Function Secrets
#   2. Supabase Dashboard → Authentication → Hooks → Send Email Hook:
#        URI: https://<project>.supabase.co/functions/v1/auth-email-hook
#        Secret: same `v1,whsec_<base64>` value
[functions.auth-email-hook]
enabled = true
verify_jwt = false
